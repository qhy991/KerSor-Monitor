# FlashInfer-Bench-26 task registry for the B200 paper experiment (E1).
#
# Source of truth for the 26 task ids and official kernel ids:
#   https://research.nvidia.com/benchmarks/sol-execbench/api/collections/4
# (kernel_id 210..235 ↔ tasks 001..026; see snapshots/b200-leaderboard/*/manifest.json)
#
# Run workspace init on Verda (B200), not locally — the local Mac has no SoL
# FlashInfer tree. SOL_ROOT on Verda is /home/qinhaiyan/sol-execbench; clone this
# repo as its sibling so the relative data_root below resolves, or export
# SOL_ROOT=/home/qinhaiyan/sol-execbench.
#
# Two-axis metric reminder: the worker loop measures speedup via bench.py
# (SoL run_dataset.py); sol_score is obtained separately via manual leaderboard
# submission and joined by the harvester. Do NOT treat them as one axis.

defaults:
  sol_root: ../sol-execbench
  data_root: ../sol-execbench/data/benchmark
  gpu: B200
  validation_cmd_template: >-
    uv run scripts/run_dataset.py {problem_dir} --solution-name solution.py -o {workspace}/out --timeout 120
  eval_cmd_template: >-
    uv run scripts/run_dataset.py {problem_dir} --solution-name solution.py -o {workspace}/out --timeout 300 --iterations 50
  promotion_criteria: "correctness 100% pass + speedup > 1.0x vs reference baseline (sol_score obtained separately via submission)"

groups:
  - name: FlashInfer
    priority: 1
    tasks:
      # === fused_add_rmsnorm (001-003) ===
      - id: FI-001
        name: fused_add_rmsnorm_h2048
        problem_dir: FlashInfer-Bench/001_fused_add_rmsnorm_h2048
        description: "Fused Add + RMSNorm, hidden_size=2048"
        family: fused_add_rmsnorm
        stage: Pre-Norm
        bottleneck: Memory
        baseline_class: torch_compile_or_adapter
        official_kernel_id: 210
        gpu: B200
        status: pending
      - id: FI-002
