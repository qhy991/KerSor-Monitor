# SOL-ExecBench Task Registry for H800
# Each task maps to one SOL-ExecBench problem.
# status: pending | drafting | planning | implementing | profiling | promoted | rejected
#
# Validation/eval commands use sol-execbench CLI via run_dataset.py.
# GPU-bound commands are wrapped by gpu-run.sh at runtime (infra external lock).
#
# Data root: /mnt/public/qinhaiyan/sol-execbench/data/benchmark

defaults:
  sol_root: /mnt/public/zhaotianlang/projects/kernel-agent/sol-execbench
  data_root: /mnt/public/zhaotianlang/projects/kernel-agent/sol-execbench/data/benchmark
  validation_cmd_template: >-
    uv run scripts/run_dataset.py {problem_dir} --solution-name solution.py -o {workspace}/out --timeout 120
  eval_cmd_template: >-
    uv run scripts/run_dataset.py {problem_dir} --solution-name solution.py -o {workspace}/out --timeout 300 --iterations 50
  promotion_criteria: "correctness 100% pass + SOL score > reference baseline"

